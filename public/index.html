<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CF AI Task Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .status {
            font-size: 12px;
            opacity: 0.9;
        }

        .status.connected {
            color: #4ade80;
        }

        .status.disconnected {
            color: #f87171;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f9fafb;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: white;
            color: #1f2937;
            border: 1px solid #e5e7eb;
            border-bottom-left-radius: 4px;
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        #messageInput:focus {
            border-color: #667eea;
        }

        #sendButton {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #sendButton:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        #sendButton:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .tasks-section {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
        }

        .tasks-section h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #1f2937;
        }

        .task-item {
            padding: 8px 12px;
            margin: 5px 0;
            background: #f9fafb;
            border-radius: 8px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
        }

        .task-status.pending {
            background: #fef3c7;
            color: #92400e;
        }

        .task-status.in_progress {
            background: #dbeafe;
            color: #1e40af;
        }

        .task-status.completed {
            background: #d1fae5;
            color: #065f46;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 CF AI Task Assistant</h1>
            <div class="status disconnected" id="status">Disconnected</div>
        </div>
        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="message-bubble">
                    Hello! I'm your AI Task Assistant. I can help you manage tasks and answer questions. 
                    Try saying "Add a task to finish my project" or "What tasks do I have?"
                </div>
            </div>
        </div>
        <div class="input-container">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Type your message here..." 
                disabled
            />
            <button id="sendButton" disabled>Send</button>
        </div>
    </div>

    <script>
        let ws = null;
        let agentId = 'user-' + Math.random().toString(36).substr(2, 9);
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const status = document.getElementById('status');

        // Get the WebSocket URL from the current page
        function getWebSocketURL() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const host = window.location.host;
            return `${protocol}//${host}/?agentId=${agentId}`;
        }

        function connect() {
            try {
                const wsUrl = getWebSocketURL();
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    status.textContent = 'Connected';
                    status.className = 'status connected';
                    messageInput.disabled = false;
                    sendButton.disabled = false;
                    addMessage('assistant', 'Connected to agent! How can I help you?');
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.result) {
                            if (typeof data.result === 'string') {
                                addMessage('assistant', data.result);
                            } else if (Array.isArray(data.result)) {
                                // Handle task list
                                displayTasks(data.result);
                            } else if (data.result.id) {
                                // Handle task object
                                addMessage('assistant', `Task "${data.result.title}" has been ${data.result.status}.`);
                            }
                        } else if (data.error) {
                            addMessage('assistant', `Error: ${data.error.message || data.error}`);
                        }
                    } catch (e) {
                        addMessage('assistant', event.data);
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    addMessage('assistant', 'Connection error occurred.');
                };

                ws.onclose = () => {
                    status.textContent = 'Disconnected';
                    status.className = 'status disconnected';
                    messageInput.disabled = true;
                    sendButton.disabled = true;
                    addMessage('assistant', 'Connection closed. Reconnecting...');
                    setTimeout(connect, 3000);
                };
            } catch (error) {
                console.error('Failed to connect:', error);
                addMessage('assistant', 'Failed to connect. Make sure the worker is running.');
            }
        }

        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = content;
            
            messageDiv.appendChild(bubble);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function displayTasks(tasks) {
            // Remove existing tasks section if any
            const existing = document.getElementById('tasksSection');
            if (existing) {
                existing.remove();
            }

            if (tasks.length === 0) {
                addMessage('assistant', 'You have no tasks.');
                return;
            }

            const tasksSection = document.createElement('div');
            tasksSection.id = 'tasksSection';
            tasksSection.className = 'tasks-section';
            tasksSection.innerHTML = '<h3>Your Tasks:</h3>';

            tasks.forEach(task => {
                const taskItem = document.createElement('div');
                taskItem.className = 'task-item';
                taskItem.innerHTML = `
                    <span>${task.title}</span>
                    <span class="task-status ${task.status}">${task.status}</span>
                `;
                tasksSection.appendChild(taskItem);
            });

            chatContainer.appendChild(tasksSection);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || !ws || ws.readyState !== WebSocket.OPEN) {
                return;
            }

            addMessage('user', message);
            messageInput.value = '';

            // Try to detect if user wants to list tasks
            if (message.toLowerCase().includes('list task') || message.toLowerCase().includes('show task') || message.toLowerCase().includes('what task')) {
                ws.send(JSON.stringify({
                    method: 'listTasks',
                    params: []
                }));
            } else {
                // Otherwise, use chat
                ws.send(JSON.stringify({
                    method: 'chat',
                    params: [message]
                }));
            }
        }

        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Connect on page load
        connect();
    </script>
</body>
</html>
